name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2"
  XCBEAUTIFY_VERSION: "3.2.1"
  XCBEAUTIFY_SHA256: "f181ada16c637adb2ce7a58141f9182755ad382f2540042b215b9e6aa65c1977"

jobs:
  unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache xcbeautify
        if: runner.os == 'Linux'
        id: cache-xcbeautify
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcbeautify
          key: xcbeautify-${{ env.XCBEAUTIFY_VERSION }}-linux-static

      - name: Install xcbeautify
        if: runner.os == 'Linux' && steps.cache-xcbeautify.outputs.cache-hit != 'true'
        run: |
          archive="$(mktemp)"
          curl -fsSL -o "$archive" "https://github.com/cpisciotta/xcbeautify/releases/download/$XCBEAUTIFY_VERSION/xcbeautify-${XCBEAUTIFY_VERSION}-x86_64-linux-static.tar.xz"
          echo "$XCBEAUTIFY_SHA256  $archive" | sha256sum -c -
          tar -xJf "$archive" -C /usr/local/bin
          rm "$archive"

      - name: Perform unit tests
        run: |
          set -o pipefail
          NSUnbufferedIO=YES swift test --parallel 2>&1 | xcbeautify --renderer github-actions

  build:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache xcbeautify
        if: runner.os == 'Linux'
        id: cache-xcbeautify
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcbeautify
          key: xcbeautify-${{ env.XCBEAUTIFY_VERSION }}-linux-static

      - name: Install xcbeautify
        if: runner.os == 'Linux' && steps.cache-xcbeautify.outputs.cache-hit != 'true'
        run: |
          archive="$(mktemp)"
          curl -fsSL -o "$archive" "https://github.com/cpisciotta/xcbeautify/releases/download/$XCBEAUTIFY_VERSION/xcbeautify-${XCBEAUTIFY_VERSION}-x86_64-linux-static.tar.xz"
          echo "$XCBEAUTIFY_SHA256  $archive" | sha256sum -c -
          tar -xJf "$archive" -C /usr/local/bin
          rm "$archive"

      - name: Build release
        run: |
          set -o pipefail
          NSUnbufferedIO=YES swift build -c release 2>&1 | xcbeautify

      - name: Upload eta binary
        uses: actions/upload-artifact@v7
        with:
          name: eta-${{ matrix.os }}
          path: .build/release/eta
          if-no-files-found: error
          retention-days: 1

  simulate:
    name: Example simulate.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run simulate.sh real test
        run: |
          chmod +x eta
          scripts/ci/test-simulate.sh ./eta

      - name: Upload simulate diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: simulate-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/simulate
          if-no-files-found: ignore
          retention-days: 7

  stdio:
    name: Stdout/Stderr Logs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run stdout/stderr cleanliness test
        run: |
          chmod +x eta
          scripts/ci/test-stdio-clean.sh ./eta

      - name: Upload stdio diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: stdio-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/stdio
          if-no-files-found: ignore
          retention-days: 7

  performance:
    name: Large Output Performance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run large-output performance test
        run: |
          chmod +x eta
          scripts/ci/test-large-output.sh ./eta

      - name: Upload performance diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: performance-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/large-output
          if-no-files-found: ignore
          retention-days: 7
