name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2"
  XCBEAUTIFY_VERSION: "3.2.1"
  XCBEAUTIFY_SHA256: "f181ada16c637adb2ce7a58141f9182755ad382f2540042b215b9e6aa65c1977"

jobs:
  unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache xcbeautify
        if: runner.os == 'Linux'
        id: cache-xcbeautify
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcbeautify
          key: xcbeautify-${{ env.XCBEAUTIFY_VERSION }}-linux-static

      - name: Install xcbeautify
        if: runner.os == 'Linux' && steps.cache-xcbeautify.outputs.cache-hit != 'true'
        run: |
          archive="$(mktemp)"
          curl -fsSL -o "$archive" "https://github.com/cpisciotta/xcbeautify/releases/download/$XCBEAUTIFY_VERSION/xcbeautify-${XCBEAUTIFY_VERSION}-x86_64-linux-static.tar.xz"
          echo "$XCBEAUTIFY_SHA256  $archive" | sha256sum -c -
          tar -xJf "$archive" -C /usr/local/bin
          rm "$archive"

      - name: Perform unit tests
        run: |
          set -o pipefail
          NSUnbufferedIO=YES swift test --parallel 2>&1 | xcbeautify --renderer github-actions

  integration:
    name: Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Cache xcbeautify
        if: runner.os == 'Linux'
        id: cache-xcbeautify
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/xcbeautify
          key: xcbeautify-${{ env.XCBEAUTIFY_VERSION }}-linux-static

      - name: Install xcbeautify
        if: runner.os == 'Linux' && steps.cache-xcbeautify.outputs.cache-hit != 'true'
        run: |
          archive="$(mktemp)"
          curl -fsSL -o "$archive" "https://github.com/cpisciotta/xcbeautify/releases/download/$XCBEAUTIFY_VERSION/xcbeautify-${XCBEAUTIFY_VERSION}-x86_64-linux-static.tar.xz"
          echo "$XCBEAUTIFY_SHA256  $archive" | sha256sum -c -
          tar -xJf "$archive" -C /usr/local/bin
          rm "$archive"

      - name: Build release
        run: |
          set -o pipefail
          NSUnbufferedIO=YES swift build -c release 2>&1 | xcbeautify

      - name: Run simulate.sh real test
        id: simulate
        continue-on-error: true
        run: |
          scripts/ci/test-simulate.sh .build/release/eta

      - name: Upload simulate diagnostics
        if: ${{ steps.simulate.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: simulate-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/simulate
          if-no-files-found: ignore
          retention-days: 7

      - name: Run stdout/stderr cleanliness test
        id: stdio
        continue-on-error: true
        run: |
          scripts/ci/test-stdio-clean.sh .build/release/eta

      - name: Upload stdio diagnostics
        if: ${{ steps.stdio.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: stdio-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/stdio
          if-no-files-found: ignore
          retention-days: 7

      - name: Run large-output performance test
        id: performance
        continue-on-error: true
        run: |
          scripts/ci/test-large-output.sh .build/release/eta

      - name: Upload performance diagnostics
        if: ${{ steps.performance.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: performance-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/large-output
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail if release checks failed
        if: ${{ always() && (steps.simulate.outcome == 'failure' || steps.stdio.outcome == 'failure' || steps.performance.outcome == 'failure') }}
        run: exit 1
