name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.x"

jobs:
  go:
    name: Go Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Perform Go tests
        run: go test ./...

      - name: Check Go formatting
        run: |
          test -z "$(gofmt -l $(git ls-files '*.go'))"

      - name: Run go vet
        run: go vet ./...

      - name: Run race-sensitive suites
        run: go test -race ./internal/process ./internal/render ./internal/coordinator ./internal/eta

      - name: Check dependency freshness
        run: go list -m -u -json all

      - name: Run vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  integration:
    name: Go Integration Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release
        run: make build

      - name: Run simulate.sh real test
        id: simulate
        continue-on-error: true
        run: |
          scripts/ci/test-simulate.sh .build/go/eta

      - name: Upload simulate diagnostics
        if: ${{ steps.simulate.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: simulate-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/simulate
          if-no-files-found: ignore
          retention-days: 7

      - name: Run stdout/stderr cleanliness test
        id: stdio
        continue-on-error: true
        run: |
          scripts/ci/test-stdio-clean.sh .build/go/eta

      - name: Upload stdio diagnostics
        if: ${{ steps.stdio.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: stdio-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/stdio
          if-no-files-found: ignore
          retention-days: 7

      - name: Run large-output performance test
        id: performance
        continue-on-error: true
        run: |
          scripts/ci/test-large-output.sh .build/go/eta

      - name: Upload performance diagnostics
        if: ${{ steps.performance.outcome == 'failure' }}
        uses: actions/upload-artifact@v7
        with:
          name: performance-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/large-output
          if-no-files-found: ignore
          retention-days: 7

      - name: Fail if release checks failed
        if: ${{ always() && (steps.simulate.outcome == 'failure' || steps.stdio.outcome == 'failure' || steps.performance.outcome == 'failure') }}
        run: exit 1
