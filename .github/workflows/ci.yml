name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: "6.2"

jobs:
  unit:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install xcbeautify
        if: runner.os == 'Linux'
        run: brew install xcbeautify

      - name: Run Swift tests
        run: |
          set -o pipefail
          swift test 2>&1 | xcbeautify -q --is-ci

  build:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Swift
        if: runner.os == 'Linux'
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install xcbeautify
        if: runner.os == 'Linux'
        run: brew install xcbeautify

      - name: Build release
        run: |
          set -o pipefail
          swift build -c release 2>&1 | xcbeautify

      - name: Upload eta binary
        uses: actions/upload-artifact@v7
        with:
          name: eta-${{ matrix.os }}
          path: .build/release/eta
          if-no-files-found: error
          retention-days: 1

  simulate:
    name: Example simulate.sh (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run simulate.sh real test
        run: |
          chmod +x eta
          scripts/ci/test-simulate.sh ./eta

      - name: Upload simulate diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: simulate-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/simulate
          if-no-files-found: ignore
          retention-days: 7

  stdio:
    name: Stdout/Stderr Logs (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run stdout/stderr cleanliness test
        run: |
          chmod +x eta
          scripts/ci/test-stdio-clean.sh ./eta

      - name: Upload stdio diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: stdio-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/stdio
          if-no-files-found: ignore
          retention-days: 7

  performance:
    name: Large Output Performance (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download eta binary
        uses: actions/download-artifact@v8
        with:
          name: eta-${{ matrix.os }}

      - name: Run large-output performance test
        run: |
          chmod +x eta
          scripts/ci/test-large-output.sh ./eta

      - name: Upload performance diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: performance-diagnostics-${{ matrix.os }}
          path: ${{ runner.temp }}/eta-ci/large-output
          if-no-files-found: ignore
          retention-days: 7
